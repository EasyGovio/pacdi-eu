<script>  
(function() {  
  var saved = JSON.parse(localStorage.getItem('savedPasswords') || '[]');  
  
  var i18n = {  
    tr: {  
      page_title: '🔐 Şifre Oluşturucu',  
      length: 'Uzunluk',  
      upper: 'Büyük Harf',  
      lower: 'Küçük Harf',  
      numbers: 'Rakam',  
      symbols: 'Özel Karakter',  
      generate: 'Şifre Oluştur',  
      copy: 'Kopyala',  
      save: 'Şifreyi Kaydet',  
      saved_title: '📂 Kayıtlı Şifreler',  
      empty: 'Kayıtlı şifre yok.',  
      copied: 'Kopyalandı!',  
      saved_alert: 'Önce bir şifre oluşturun.',  
      note_prompt: 'Bu şifre için bir not girin (isteğe bağlı):',  
      legal: 'Yasal & Gizlilik'  
    },  
    de: {  
      page_title: '🔐 Passwort-Generator',  
      length: 'Länge',  
      upper: 'Großbuchstaben',  
      lower: 'Kleinbuchstaben',  
      numbers: 'Zahlen',  
      symbols: 'Sonderzeichen',  
      generate: 'Passwort generieren',  
      copy: 'Kopieren',  
      save: 'Passwort speichern',  
      saved_title: '📂 Gespeicherte Passwörter',  
      empty: 'Keine gespeicherten Passwörter.',  
      copied: 'Kopiert!',  
      saved_alert: 'Bitte erst ein Passwort generieren.',  
      note_prompt: 'Notiz für dieses Passwort (optional):',  
      legal: 'Impressum & Datenschutz'  
    },  
    en: {  
      page_title: '🔐 Password Generator',  
      length: 'Length',  
      upper: 'Uppercase',  
      lower: 'Lowercase',  
      numbers: 'Numbers',  
      symbols: 'Symbols',  
      generate: 'Generate Password',  
      copy: 'Copy',  
      save: 'Save Password',  
      saved_title: '📂 Saved Passwords',  
      empty: 'No saved passwords.',  
      copied: 'Copied!',  
      saved_alert: 'Please generate a password first.',  
      note_prompt: 'Enter a note for this password (optional):',  
      legal: 'Legal & Privacy'  
    }  
  };  
  
  var currentLang = 'de';  
  
  function setLanguage(lang) {  
    currentLang = lang;  
    var t = i18n[lang] || i18n.de;  
  
    document.getElementById('page-title').textContent = t.page_title;  
    document.getElementById('lbl-length').textContent = t.length;  
    document.getElementById('lbl-upper').textContent = t.upper;  
    document.getElementById('lbl-lower').textContent = t.lower;  
    document.getElementById('lbl-numbers').textContent = t.numbers;  
    document.getElementById('lbl-symbols').textContent = t.symbols;  
    document.getElementById('btn-generate-text').textContent = t.generate;  
    document.getElementById('copy-text').textContent = t.copy;  
    document.getElementById('save-text').textContent = t.save;  
    document.getElementById('legal-link').textContent = t.legal;  
  
    buildNav(lang);  
    document.querySelectorAll('.lang-btn').forEach(function(b) {  
      b.classList.toggle('active', b.dataset.lang === lang);  
    });  
    document.documentElement.lang = lang;  
    try { sessionStorage.setItem('autoLang', lang); } catch(e) {}  
    renderSaved();  
  }  
  
  function buildNav(lang) {  
    var nav = document.getElementById('mainNav');  
    if (!nav) return;  
    var items = [  
      ['/', '🏠', {tr:'Ana Sayfa', de:'Startseite', en:'Home'}],  
      ['/qr.html', '**▣**', {tr:'QR', de:'QR', en:'QR'}],  
      ['/pruefprotokoll.html', '⚡', {tr:'Prüfprotokoll', de:'Prüfprotokoll', en:'Inspection'}],  
      ['/scanner.html', '📷', {tr:'Tarayıcı', de:'Scanner', en:'Scanner'}],  
      ['/envanter.html', '📦', {tr:'Envanter', de:'Inventar', en:'Inventory'}],  
      ['/password.html', '🔐', {tr:'Şifre', de:'Passwort', en:'Password'}]  
    ];  
    var html = '';  
    var page = (window.location.pathname.split('/').pop() || 'password.html');  
    for (var i = 0; i < items.length; i++) {  
      var href = items[i][0];  
      var icon = items[i][1];  
      var label = items[i][2][lang] || items[i][2]['de'];  
      var isActive = (page === href.replace('/','') || (href==='/' && (page===''||page==='index.html')));  
      var color = isActive ? '#F6B45F' : '#7a9ab8';  
      var border = isActive ? '#F6B45F' : 'transparent';  
      html += '<a href="' + href + '" style="color:' + color + ';text-decoration:none;font-size:0.7rem;padding:5px 10px;border-radius:16px;border:1px solid ' + border + ';white-space:nowrap;display:inline-flex;align-items:center;gap:3px;">'  
        + '<span>' + icon + '</span>'  
        + '<span>' + label + '</span>'  
        + '</a>';  
    }  
    nav.innerHTML = html;  
  }  
  
  function generatePassword() {  
    var length = parseInt(document.getElementById('passwordLength').value) || 16;  
    var upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';  
    var lower = 'abcdefghijklmnopqrstuvwxyz';  
    var numbers = '0123456789';  
    var symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';  
    var chars = '';  
    if (document.getElementById('includeUpper').checked) chars += upper;  
    if (document.getElementById('includeLower').checked) chars += lower;  
    if (document.getElementById('includeNumbers').checked) chars += numbers;  
    if (document.getElementById('includeSymbols').checked) chars += symbols;  
    if (!chars) { alert('En az bir karakter türü seçin.'); return ''; }  
    var password = '';  
    for (var i = 0; i < length; i++) {  
      password += chars.charAt(Math.floor(Math.random() * chars.length));  
    }  
    return password;  
  }  
  
  function displayPassword(pwd) {  
    document.getElementById('generatedPassword').innerText = pwd;  
  }  
  
  document.getElementById('generateBtn').addEventListener('click', function() {  
    var pwd = generatePassword();  
    if (pwd) displayPassword(pwd);  
  });  
  
  window.copyPassword = function() {  
    var t = i18n[currentLang] || i18n.de;  
    var pwd = document.getElementById('generatedPassword').innerText;  
    if (pwd && pwd !== '********') {  
      navigator.clipboard.writeText(pwd).then(function() { alert(t.copied); });  
    }  
  };  
  
  document.getElementById('saveBtn').addEventListener('click', function() {  
    var t = i18n[currentLang] || i18n.de;  
    var pwd = document.getElementById('generatedPassword').innerText;  
    if (!pwd || pwd === '********') { alert(t.saved_alert); return; }  
    var note = prompt(t.note_prompt);  
    saved.push({ password: pwd, note: note || '', date: new Date().toISOString() });  
    localStorage.setItem('savedPasswords', JSON.stringify(saved));  
    renderSaved();  
  });  
  
  function renderSaved() {  
    var t = i18n[currentLang] || i18n.de;  
    var container = document.getElementById('savedPasswords');  
    if (!saved.length) {  
      container.innerHTML = '<div class="empty">' + t.empty + '</div>';  
      return;  
    }  
    container.innerHTML = '<h3 style="color:#F6B45F;font-size:0.85rem;margin-bottom:8px;">' + t.saved_title + '</h3>';  
    container.innerHTML += saved.slice(-5).reverse().map(function(item) {  
      return '<div class="saved-item"><span>' + item.password + (item.note ? ' <span class="note">📝 ' + item.note + '</span>' : '') + '</span><span style="color:#4a6a88;font-size:0.6rem;">' + new Date(item.date).toLocaleString() + '</span></div>';  
    }).join('');  
  }  
  
  var defaultLang = null;  
  try { defaultLang = sessionStorage.getItem('autoLang'); } catch(e) {}  
  if (!defaultLang || !i18n[defaultLang]) {  
    var navLang = (navigator.language || 'de').toLowerCase();  
    defaultLang = navLang.indexOf('tr') === 0 ? 'tr' : (navLang.indexOf('en') === 0 ? 'en' : 'de');  
  }  
  setLanguage(defaultLang);  
  displayPassword(generatePassword());  
})();  
</script>

      bar.innerHTML =  
        '<span style="color:#eaf2fb;font-size:0.85rem;">📲 Ana ekrana ekle &mdash; daha hızlı aç!</span>' +  
        '<div style="display:flex;gap:8px;">' +  
          '<button onclick="installPWA()" style="background:#F6B45F;border:none;color:#04162E;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.82rem;">Ekle</button>' +  
          '<button onclick="document.getElementById(\'pwa-banner\').remove();sessionStorage.setItem(\'pwa-banner-shown\',\'1\')" style="background:transparent;border:1px solid rgba(246,180,95,0.3);color:#7a9ab8;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.82rem;">Sonra</button>' +  
        '</div>';  
      document.body.appendChild(bar);  
    }, 3000);  
  });  
  window.installPWA = function() {  
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }  
    var b = document.getElementById('pwa-banner'); if (b) b.remove();  
    sessionStorage.setItem('pwa-banner-shown', '1');  
  };  
})();  
</script>  
</body>  
</html>
